      name: URL
      description: HTTP(S) URL of the image (10 MB max, 40 MB with auto_resize).
      required: true
      example: "https://example.com/receipt.png"
      selector:
        text: {}
    image_width:
      name: Width (pixels)
      selector:
        number:
          min: 16
          max: 2048
          step: 1
    dither:
      name: Dither Mode
      default: "floyd-steinberg"
      selector:
        select:
          options:
            - "floyd-steinberg"
            - "none"
            - "threshold"
    auto_resize:
      name: Auto-Resize
      default: true
      selector:
        boolean: {}
    cut:
      name: Cut
      selector:
        select:
          options:
            - "none"
            - "partial"
            - "full"
    feed:
      name: Feed Lines
      default: 1
      selector:
        number:
          min: 0
          max: 50
          step: 1

preview_image:
  name: Preview Image (no paper)
  description: >
    Run the full image pipeline (dither, resize, etc) and write the
    1-bit PNG to disk WITHOUT printing it. Returns the output path so
    automations can chain a notification.
  fields:
    device_id:
      name: Device
      description: Use this printer's profile (width, defaults).
      required: false
      selector:
        device:
          integration: escpos_printer
    image:
      name: Image
      description: Same source forms as print_image.
      required: true
      selector:
        template: {}
    output_path:
      name: Output Path
      description: >
        Where to save the PNG. Must be inside allowlist_external_dirs
        (or under /tmp). Defaults to /tmp/escpos_preview_<entry>.png.
      selector:
        text: {}
    image_width:
      name: Width (pixels)
      selector:
        number:
          min: 16
          max: 2048
          step: 1
    dither:
      name: Dither Mode
      default: "floyd-steinberg"
      selector:
        select:
          options:
            - "floyd-steinberg"
            - "none"
            - "threshold"
    threshold:
      name: Threshold
      default: 128
      selector:
        number:
          min: 1
          max: 254
          step: 1
    autocontrast:
      name: Autocontrast
      default: false
      selector:
        boolean: {}
    invert:
      name: Invert
      default: false
      selector:
        boolean: {}
    mirror:
      name: Mirror
      default: false
      selector:
        boolean: {}

calibration_print:
  name: Calibration Print
  description: >
    Print a calibration sheet — a pixel ruler plus a threshold sweep
    strip — so you can visually pick the best dither/threshold for
    your printer. Burns ~10 cm of paper.
  fields:
    device_id:
      name: Device
      description: Printer device.
      required: false
      selector:
        device:
          integration: escpos_printer
    cut:
      name: Cut
      default: "full"
      selector:
        select:
          options:
            - "none"
            - "partial"
            - "full"
    feed:
      name: Feed Lines
      default: 2
      selector:
        number:
          min: 0
          max: 50
          step: 1

print_barcode:
  name: Print Barcode
  description: Print a barcode. Select one or more printer devices as the target.
  fields:
    device_id:
      name: Device
      description: Select one or more printer devices (if omitted, broadcasts to all printers)
      required: false
      selector:
        device:
          integration: escpos_printer
    code:
      name: Code
      description: Barcode data
      required: true
      example: "4006381333931"
      selector:
        text: {}
    bc:
      name: Barcode Type
      description: Type of barcode to print
      required: true
      example: "EAN13"
      selector:
        select:
          options:
            - "EAN13"
            - "EAN8"
            - "JAN13"
            - "JAN8"
            - "UPC-A"
            - "UPC-E"
            - "CODE39"
            - "CODE93"
            - "CODE128"
            - "ITF"
            - "ITF14"
            - "CODABAR"
    height:
      name: Height
      description: Barcode height in dots
      default: 64
      selector:
        number:
          min: 1
          max: 255
          step: 1
          mode: slider
    width:
      name: Width
      description: Barcode width (2-6)
      default: 3
      selector:
        number:
          min: 2
          max: 6
          step: 1
          mode: slider
    pos:
      name: Text Position
      description: Position of human-readable text
      default: "BELOW"
      selector:
        select:
          options:
            - "ABOVE"
            - "BELOW"
            - "BOTH"
            - "OFF"
    font:
      name: Font
      description: Font for human-readable text
      default: "A"
      selector:
        select:
          options:
            - "A"
            - "B"
    align_ct:
      name: Center Align
      description: Center align the barcode
      default: true
      selector:
        boolean: {}
    check:
      name: Checksum
      description: Enable checksum validation
      default: false
      selector:
        boolean: {}
    force_software:
      name: Rendering Mode
      description: >
        Force a software-rendered barcode (image) instead of the printer's
        native barcode command. Use a specific image command if the default
        rendering looks wrong.
      selector:
        select:
          options:
            - label: "Auto (printer native)"
              value: "false"
            - label: "Force software (default)"
              value: "true"
            - label: "Software: Graphics"
              value: "graphics"
            - label: "Software: Column (legacy POS-58/80)"
              value: "bitImageColumn"
            - label: "Software: Raster (Epson)"
              value: "bitImageRaster"
    align:
      name: Alignment
      description: Barcode alignment
      selector:
        select:
          options:
            - "left"
            - "center"
            - "right"
    cut:
      name: Cut
      description: Paper cutting mode after printing (defaults to the printer's configured cut mode)
      selector:
        select:
          options:
            - "none"
            - "partial"
            - "full"
    feed:
      name: Feed Lines
      description: Number of lines to feed after printing
      default: 0
      selector:
        number:
          min: 0
          max: 50
          step: 1
          mode: slider

feed:
  name: Feed Paper
  description: Feed the paper a number of lines. Select one or more printer devices as the target.
  fields:
    device_id:
      name: Device
      description: Select one or more printer devices (if omitted, broadcasts to all printers)
