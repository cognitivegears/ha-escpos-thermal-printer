print_message:
  name: Print Formatted Message
  description: >
    Print a message with full text formatting (bold, underline, size, alignment)
    plus an optional image attachment that prints as a single uninterrupted
    receipt. Targets an ESC/POS notify entity. See docs/images.md.
  target:
    entity:
      domain: notify
      integration: escpos_printer
  fields:
    message:
      name: Message
      description: The text to print
      required: true
      example: "Hello, world!"
      selector:
        text:
          multiline: true
    title:
      name: Title
      description: Optional title printed before the message
      required: false
      selector:
        text: {}
    align:
      name: Alignment
      description: Text alignment
      selector:
        select:
          options:
            - "left"
            - "center"
            - "right"
    bold:
      name: Bold
      description: Enable bold text
      default: false
      selector:
        boolean: {}
    underline:
      name: Underline
      description: Underline style
      default: "none"
      selector:
        select:
          options:
            - "none"
            - "single"
            - "double"
    width:
      name: Width
      description: Font width (`normal`, `double`, `triple`, or `1-8`)
      default: "normal"
      selector:
        select:
          options:
