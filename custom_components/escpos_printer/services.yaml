      name: Image
      description: >
        Same source forms as print_image — URL, file path, camera.<id>,
        image.<id>, base64 data URI (raster or SVG), or a Jinja
        template. SVG sources are rasterised first; the preview PNG
        reflects what would actually print.
      required: true
      example: /config/www/logo.png
      selector:
        template: {}
    output_path:
      name: Output Path
      description: >
        Where to save the PNG. Must be inside the system temp directory
        (typically /tmp). Defaults to /tmp/escpos_preview_<entry>.png.
        To stage the preview into /config/www/ for a Lovelace card, add
        a follow-up automation step that copies the returned `path`.
      selector:
