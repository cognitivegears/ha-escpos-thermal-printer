print_camera_snapshot:
  name: Print Camera Snapshot
  description: >
    Print a live snapshot from a camera entity. Convenience wrapper around
    print_image with a camera-entity selector for a friendlier UI. Camera
    entities emit raster bytes only — SVG sources are not supported here
    (use print_image_url / print_image_path for SVG).
  fields:
    device_id:
      name: Device
      description: Select one or more printer devices (if omitted, broadcasts to all printers).
      required: false
      selector:
        device:
          integration: escpos_printer
    camera_entity:
      name: Camera
      description: Camera entity to snapshot.
      required: true
      example: camera.front_door
      selector:
        entity:
          domain: camera
    image_width:
      name: Width (pixels)
