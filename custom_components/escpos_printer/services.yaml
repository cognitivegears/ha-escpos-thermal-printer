print_message:
  name: Print Formatted Message
  description: >
    Print a message with full text formatting (bold, underline, size, alignment)
    plus an optional image attachment that prints as a single uninterrupted
    receipt. Targets an ESC/POS notify entity. See docs/images.md.
  target:
    entity:
      domain: notify
      integration: escpos_printer
  fields:
    message:
      name: Message
      description: The text to print
      required: true
      example: "Hello, world!"
      selector:
        text:
          multiline: true
    title:
      name: Title
      description: Optional title printed before the message
      required: false
      selector:
        text: {}
    align:
      name: Alignment
      description: Text alignment
      selector:
        select:
          options:
            - "left"
            - "center"
            - "right"
    bold:
      name: Bold
      description: Enable bold text
      default: false
      selector:
        boolean: {}
    underline:
      name: Underline
      description: Underline style
      default: "none"
      selector:
        select:
          options:
            - "none"
            - "single"
            - "double"
    width:
      name: Width
      description: Font width (`normal`, `double`, `triple`, or `1-8`)
      default: "normal"
      selector:
        select:
          options:
            - "normal"
            - "double"
            - "triple"
            - "1"
            - "2"
            - "3"
            - "4"
            - "5"
            - "6"
            - "7"
            - "8"
    height:
      name: Height
      description: Font height (`normal`, `double`, `triple`, or `1-8`)
      default: "normal"
      selector:
        select:
          options:
            - "normal"
            - "double"
            - "triple"
            - "1"
            - "2"
            - "3"
            - "4"
            - "5"
            - "6"
            - "7"
            - "8"
    utf8:
      name: UTF-8 Mode
      description: Enable UTF-8 transcoding (converts special characters to printer-compatible encoding)
      default: false
      selector:
        boolean: {}
    encoding:
      name: Encoding
      description: Character encoding override (ignored when UTF-8 mode is enabled)
      selector:
        text: {}
    image:
      name: Image
      description: >
        Optional image printed after the message. Accepts the same source
        forms as print_image (URL, file path, camera.<id>, image.<id>,
        base64 data URI, or template). See docs/images.md.
      selector:
        template: {}
    image_width:
      name: Image Width (pixels)
      description: Target image width; defaults to printer profile width.
      selector:
        number:
          min: 16
          max: 2048
          step: 1
    image_align:
      name: Image Alignment
      description: Image alignment on the page.
      selector:
        select:
          options:
            - "left"
            - "center"
            - "right"
    image_dither:
      name: Image Dither
      description: Dither mode for the image (see print_image).
      default: "floyd-steinberg"
      selector:
        select:
          options:
            - "floyd-steinberg"
            - "none"
            - "threshold"
    image_rotation:
      name: Image Rotation
      description: Rotate the image in degrees (clockwise).
      default: 0
      selector:
        select:
          options:
            - "0"
            - "90"
            - "180"
            - "270"
    image_impl:
      name: Image Implementation
      description: >
        ESC/POS image command (see print_image). Leave unset to honor the
        printer's Reliability profile.
      selector:
        select:
          options:
            - label: "Raster (default — Epson)"
              value: "bitImageRaster"
            - label: "Graphics (newer ESC/POS)"
              value: "graphics"
            - label: "Column (legacy POS-58/80)"
              value: "bitImageColumn"
    image_center:
      name: Center Image
      description: Horizontally center the image on the paper.
      default: false
      selector:
        boolean: {}
    image_autocontrast:
      name: Image Autocontrast
      description: Stretch contrast before B&W conversion.
      default: false
      selector:
        boolean: {}
    image_invert:
      name: Image Invert
      description: Swap black and white before B&W conversion.
      default: false
      selector:
        boolean: {}
    image_mirror:
      name: Image Mirror
      description: Flip image left-to-right.
      default: false
      selector:
        boolean: {}
    image_auto_resize:
      name: Image Auto-Resize
      description: >
        Allow source images up to 40 MB and downscale before processing.
      default: false
      selector:
        boolean: {}
    image_fallback_image:
      name: Image Fallback
      description: Optional fallback image source if the primary fails.
      example: "/config/www/placeholder.png"
      selector:
        template: {}
    image_threshold:
      name: Image Threshold
      description: Threshold value (1-254) when image_dither is "threshold".
      default: 128
      selector:
        number:
          min: 1
          max: 254
          step: 1
    image_fragment_height:
      name: Image Fragment Height
      description: >
        Rows per chunk when sending the image. Leave unset to honor the
        printer's Reliability profile. See print_image notes.
      selector:
        number:
          min: 16
          max: 1024
          step: 16
    image_chunk_delay_ms:
      name: Image Chunk Delay (ms)
      description: >
        Milliseconds to sleep between image chunks. Leave unset to honor the
        printer's Reliability profile. See print_image notes.
      selector:
        number:
          min: 0
          max: 5000
          step: 10
    cut:
      name: Cut
      description: Paper cutting mode after printing (defaults to the printer's configured cut mode)
      selector:
        select:
          options:
            - "none"
            - "partial"
            - "full"
    feed:
      name: Feed Lines
      description: Number of lines to feed after printing
      default: 0
      selector:
        number:
          min: 0
          max: 50
          step: 1
          mode: slider
