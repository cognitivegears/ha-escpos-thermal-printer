      default: 128
      selector:
        number:
          min: 1
          max: 254
          step: 1
    mirror:
      name: Mirror Horizontally
      description: >
        Flip the image left-to-right before printing. Useful for receipt-window
        displays where the print is read through the back of the paper.
      default: false
      selector:
        boolean: {}
    invert:
      name: Invert Colors
      description: >
        Swap black and white before B&W conversion. Useful for dark-mode source
        images, white-on-black logos, or printing reflected QR codes.
      default: false
      selector:
        boolean: {}
    autocontrast:
      name: Autocontrast
      description: Stretch contrast before B&W conversion (helps photos).
      default: false
      selector:
        boolean: {}
    auto_resize:
      name: Auto-Resize Large Sources
      description: >
        Allow raster source images up to 40 MB and downscale before processing.
        Enable when printing phone snapshots, high-resolution cameras, or any
        source that would otherwise hit the 10 MB cap. SVG sources remain
        capped at 1 MB regardless of this setting (XML attack surface).
      default: false
      selector:
        boolean: {}
    align:
      name: Alignment
      description: Image alignment on the paper.
      selector:
        select:
          options:
