print_qr:
  name: Print QR Code
  description: Print a QR code. Select one or more printer devices as the target.
  fields:
    device_id:
      name: Device
      description: Select one or more printer devices (if omitted, broadcasts to all printers)
      required: false
      selector:
        device:
          integration: escpos_printer
    data:
      name: Data
      description: Data to encode in the QR code
      required: true
      example: "https://example.com"
      selector:
        text: {}
    size:
      name: Size
      description: QR code size (1-16)
      default: 3
      selector:
        number:
          min: 1
          max: 16
          step: 1
          mode: slider
    ec:
      name: Error Correction
      description: Error correction level
      default: "M"
      selector:
        select:
          options:
            - "L"
            - "M"
            - "Q"
            - "H"
    align:
      name: Alignment
      description: QR code alignment
      selector:
        select:
          options:
            - "left"
            - "center"
            - "right"
    cut:
      name: Cut
      description: Paper cutting mode after printing (defaults to the printer's configured cut mode)
      selector:
        select:
          options:
            - "none"
            - "partial"
            - "full"
    feed:
      name: Feed Lines
      description: Number of lines to feed after printing
      default: 0
      selector:
        number:
          min: 0
          max: 50
          step: 1
          mode: slider

print_image:
  name: Print Image (template / mixed source)
  description: >
    Print an image from a URL, file path, camera.<id>, image.<id>, base64
    data URI — or a Jinja template producing any of those. Raster
    (PNG / JPEG / WebP / HEIC / …) and SVG sources are both accepted;
    SVG is rasterised at the printer column width before the dither
    pipeline runs. Existing automations using a literal URL or path
    keep working unchanged. For a friendlier UI, prefer the focused
    services (Print Image from URL, from Path, Camera Snapshot, Image
    Entity) — see docs/images.md.
  fields:
    device_id:
      name: Device
      description: Select one or more printer devices (if omitted, broadcasts to all printers).
      required: false
      selector:
        device:
          integration: escpos_printer
    image:
      name: Image
      description: >
        URL (http/https), local file path, camera.<entity>, image.<entity>,
        data:image/...;base64,..., or a Jinja template producing any of
        these. Raster formats (PNG / JPEG / WebP / HEIC, etc.) and SVG
        are both accepted; raster is capped at 10 MB (40 MB with
        auto_resize) and SVG at 1 MB. A literal string (e.g.
        "/config/www/logo.png" or "/config/www/logo.svg") works the
        same as it did before — the template editor accepts plain text.
      required: true
      example: /config/www/logo.png
      selector:
        template: {}
    image_width:
      name: Width (pixels)
      description: >
        Target width in pixels. Defaults to the printer profile's max pixel
        width (or 512 if unknown — check the log for a WARNING). The image is
        scaled proportionally and is never upscaled.
      selector:
        number:
          min: 16
          max: 2048
          step: 1
    rotation:
      name: Rotation
      description: Rotate the image (degrees, clockwise) before printing.
      default: 0
      selector:
        select:
          options:
            - "0"
            - "90"
            - "180"
            - "270"
    dither:
      name: Dither Mode
      description: >
        How to convert to 1-bit B&W. floyd-steinberg works well for photos;
        threshold gives crisp logos/text; none disables dithering.
      default: floyd-steinberg
      selector:
        select:
          options:
            - floyd-steinberg
            - none
            - threshold
    threshold:
      name: Threshold
      description: "Threshold value (1-254) when dither is \"threshold\". 100-180 typical for line art."
      default: 128
      selector:
        number:
          min: 1
          max: 254
          step: 1
    mirror:
      name: Mirror Horizontally
      description: >
        Flip the image left-to-right before printing. Useful for receipt-window
        displays where the print is read through the back of the paper.
      default: false
      selector:
        boolean: {}
    invert:
      name: Invert Colors
      description: >
        Swap black and white before B&W conversion. Useful for dark-mode source
        images, white-on-black logos, or printing reflected QR codes.
      default: false
      selector:
        boolean: {}
    autocontrast:
      name: Autocontrast
      description: Stretch contrast before B&W conversion (helps photos).
      default: false
      selector:
        boolean: {}
    auto_resize:
      name: Auto-Resize Large Sources
      description: >
        Allow raster source images up to 40 MB and downscale before processing.
        Enable when printing phone snapshots, high-resolution cameras, or any
        source that would otherwise hit the 10 MB cap. SVG sources remain
        capped at 1 MB regardless of this setting (XML attack surface).
      default: false
      selector:
        boolean: {}
    align:
      name: Alignment
      description: Image alignment on the paper.
      selector:
        select:
          options:
            - left
            - center
            - right
    center:
      name: Center on Paper
      description: "Horizontally center the image within the printer's paper width."
      default: false
      selector:
        boolean: {}
    high_density:
      name: High Density
      description: Use high-density printing mode if supported.
      default: true
      selector:
        boolean: {}
    cut:
      name: Cut
      description: "Paper cutting mode after printing (defaults to the printer's configured cut mode)."
      selector:
        select:
          options:
            - none
            - partial
            - full
    feed:
      name: Feed Lines
      description: Number of lines to feed after printing.
      default: 0
      selector:
        number:
          min: 0
          max: 50
          step: 1
          mode: slider
    impl:
      name: Print Implementation
      advanced: true
      description: >
        ESC/POS image command to use. Leave unset to honor the printer's
        Reliability profile (default raster). If the chosen impl isn't
        supported by the installed python-escpos, the integration silently
        falls back to a kwarg-less printer.image() call.
      selector:
        select:
          options:
            - label: Raster (default — Epson)
              value: bitImageRaster
            - label: Graphics (newer ESC/POS)
              value: graphics
            - label: Column (legacy POS-58/80)
              value: bitImageColumn
    fragment_height:
      name: Fragment Height
      advanced: true
      description: >
        Rows per chunk when sending the image. Smaller values reduce
        buffer-overrun risk on cheap printers; larger values are faster.
        Leave unset to honor the printer's Reliability profile.
      selector:
        number:
          min: 16
          max: 1024
          step: 16
    chunk_delay_ms:
      name: Chunk Delay (ms)
      advanced: true
      description: >
        Milliseconds to sleep between image chunks. Leave unset to honor the
        printer's Reliability profile (0 on Network/USB, 50 on Bluetooth).
        Set higher (e.g. 100-200) if your printer freezes or dumps characters
        on tall images.
      selector:
        number:
          min: 0
          max: 5000
          step: 10
    fallback_image:
      name: Fallback Image
      advanced: true
      description: >
        Optional URL / path / camera entity to print if the primary source
        fails to resolve. The same processing options apply to both.
      example: /config/www/placeholder.png
      selector:
        template: {}

