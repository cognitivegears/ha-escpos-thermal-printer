      example: /config/www/placeholder.png
      selector:
        template: {}

preview_image:
  name: Preview Image (no paper)
  description: >
    Run the full image pipeline (dither, resize, etc) and write the
    1-bit PNG to disk WITHOUT printing it. Returns the output path so
    automations can chain a notification. Printer-communication options
    (high density, impl, fragment height, chunk delay, center, cut, feed)
    are not exposed here because they have no effect on the file written
    to disk — they only matter when streaming to a real printer.
