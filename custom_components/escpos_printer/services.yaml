        Leave unset to honor the printer's Reliability profile.
      selector:
        number:
          min: 16
          max: 1024
          step: 16
    chunk_delay_ms:
      name: Chunk Delay (ms)
      advanced: true
      description: >
        Milliseconds to sleep between image chunks. Leave unset to honor the
