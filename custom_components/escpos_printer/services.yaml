print_image:
  name: Print Image
  description: >
    Print an image from a URL, local file path, camera entity (camera.<id>),
    image entity (image.<id>), base64 data URI, or Jinja template.
    See docs/images.md for examples, supported formats, and security notes
    (URL fetches block private/loopback IPs; local paths must lie inside
    allowlist_external_dirs; camera/image entities respect per-user
    permissions of the calling context).
  fields:
    device_id:
      name: Device
      description: Select one or more printer devices (if omitted, broadcasts to all printers)
      required: false
      selector:
        device:
          integration: escpos_printer
    image:
      name: Image
      description: >
        URL (http/https), local file path, camera.<entity>, image.<entity>,
        data:image/...;base64,..., or a Jinja template producing any of these.
      required: true
      example: "camera.front_door"
      selector:
        template: {}
    high_density:
      name: High Density
      description: Use high-density printing mode
      default: true
      selector:
        boolean: {}
    align:
      name: Alignment
      description: Image alignment
      selector:
        select:
          options:
            - "left"
            - "center"
            - "right"
    image_width:
      name: Width (pixels)
      description: >
        Target width in pixels. Defaults to the printer profile's max pixel
        width (or 512 if unknown — check the log for a WARNING). The image is
        scaled proportionally and is never upscaled.
      selector:
        number:
          min: 16
          max: 2048
          step: 1
    rotation:
      name: Rotation
      description: Rotate the image (degrees, clockwise) before printing.
      default: 0
      selector:
        select:
          options:
            - "0"
            - "90"
            - "180"
            - "270"
    dither:
      name: Dither Mode
      description: >
        How to convert to 1-bit B&W. floyd-steinberg works well for photos;
        threshold gives crisp logos/text; none disables dithering.
      default: "floyd-steinberg"
      selector:
        select:
          options:
            - "floyd-steinberg"
            - "none"
            - "threshold"
    threshold:
      name: Threshold
      description: Threshold value (1-254) when dither is "threshold". 100-180 typical for line art.
      default: 128
      selector:
        number:
          min: 1
          max: 254
          step: 1
    impl:
      name: Print Implementation
      description: >
        ESC/POS image command to use. Leave unset to honor the printer's
        Reliability profile (default raster). If the chosen impl isn't
        supported by the installed python-escpos, the integration silently
        falls back to a kwarg-less printer.image() call.
      selector:
        select:
          options:
            - label: "Raster (default — Epson)"
              value: "bitImageRaster"
            - label: "Graphics (newer ESC/POS)"
              value: "graphics"
            - label: "Column (legacy POS-58/80)"
              value: "bitImageColumn"
    center:
      name: Center on Paper
      description: Horizontally center the image within the printer's paper width.
      default: false
      selector:
        boolean: {}
    autocontrast:
      name: Autocontrast
      description: Stretch contrast before B&W conversion (helps photos).
      default: false
      selector:
        boolean: {}
    invert:
      name: Invert Colors
      description: >
        Swap black and white before B&W conversion. Useful for dark-mode source
        images, white-on-black logos, or printing reflected QR codes.
      default: false
      selector:
        boolean: {}
    mirror:
      name: Mirror Horizontally
      description: >
        Flip the image left-to-right. Useful for receipt-window displays where
        the print is read through the back of the paper.
      default: false
      selector:
        boolean: {}
    auto_resize:
      name: Auto-Resize Large Sources
      description: >
        Allow source images up to 40 MB and downscale before processing.
        Enable when printing phone snapshots, high-resolution cameras, or any
        source that would otherwise hit the 10 MB cap.
      default: false
      selector:
        boolean: {}
    fallback_image:
      name: Fallback Image
      description: >
        Optional URL / path / camera entity to print if the primary source
        fails to resolve. The same processing options apply to both.
      example: "/config/www/placeholder.png"
      selector:
        template: {}
    fragment_height:
      name: Fragment Height
      description: >
        Rows per chunk when sending the image (issue #45). Smaller values reduce
        buffer-overrun risk on cheap printers; larger values are faster.
        Leave unset to honor the printer's Reliability profile.
      selector:
        number:
          min: 16
          max: 1024
          step: 16
    chunk_delay_ms:
      name: Chunk Delay (ms)
      description: >
        Milliseconds to sleep between image chunks. Leave unset to honor the
        printer's Reliability profile (0 on Network/USB, 50 on Bluetooth).
        Set higher (e.g. 100-200) if your printer freezes or dumps characters
        on tall images.
      selector:
        number:
          min: 0
          max: 5000
          step: 10
    cut:
      name: Cut
      description: Paper cutting mode after printing (defaults to the printer's configured cut mode)
      selector:
        select:
          options:
            - "none"
            - "partial"
            - "full"
    feed:
      name: Feed Lines
      description: Number of lines to feed after printing
      default: 0
      selector:
        number:
          min: 0
          max: 50
          step: 1
          mode: slider

print_camera_snapshot:
