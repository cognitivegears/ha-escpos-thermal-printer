calibration_print:
  name: Calibration Print
  description: >
    Print a calibration sheet — a pixel ruler plus a threshold sweep
    strip — so you can visually pick the best dither/threshold for
    your printer. Burns ~10 cm of paper.
  fields:
    device_id:
      name: Device
      description: Printer device.
      required: false
      selector:
        device:
          integration: escpos_printer
    cut:
      name: Cut
