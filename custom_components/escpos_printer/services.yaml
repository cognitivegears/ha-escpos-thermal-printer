      name: Device
      description: Select one or more printer devices (if omitted, broadcasts to all printers)
      required: false
      selector:
        device:
          integration: escpos_printer
    camera_entity:
      name: Camera
      description: Camera entity to snapshot.
      required: true
      example: "camera.front_door"
      selector:
        entity:
          domain: camera
    image_width:
      name: Width (pixels)
      description: Target width in pixels. Defaults to the printer profile width.
      selector:
        number:
          min: 16
          max: 2048
          step: 1
    dither:
      name: Dither Mode
      default: "floyd-steinberg"
      selector:
        select:
          options:
            - "floyd-steinberg"
            - "none"
            - "threshold"
    autocontrast:
      name: Autocontrast
      default: true
      selector:
        boolean: {}
    auto_resize:
      name: Auto-Resize
      default: true
      selector:
        boolean: {}
    cut:
      name: Cut
      selector:
        select:
          options:
            - "none"
            - "partial"
            - "full"
    feed:
      name: Feed Lines
      default: 2
      selector:
        number:
          min: 0
          max: 50
          step: 1

