      name: Device
      description: Select one or more printer devices (if omitted, broadcasts to all printers)
      required: false
      selector:
        device:
          integration: escpos_printer
    code:
      name: Code
      description: Barcode data
      required: true
      example: "4006381333931"
      selector:
        text: {}
    bc:
      name: Barcode Type
      description: Type of barcode to print
      required: true
      example: "EAN13"
      selector:
        select:
          options:
            - "EAN13"
            - "EAN8"
            - "JAN13"
            - "JAN8"
            - "UPC-A"
            - "UPC-E"
            - "CODE39"
            - "CODE93"
            - "CODE128"
            - "ITF"
            - "ITF14"
            - "CODABAR"
    height:
      name: Height
      description: Barcode height in dots
      default: 64
      selector:
        number:
          min: 1
          max: 255
          step: 1
          mode: slider
    width:
      name: Width
      description: Barcode width (2-6)
      default: 3
      selector:
        number:
          min: 2
          max: 6
          step: 1
          mode: slider
    pos:
      name: Text Position
      description: Position of human-readable text
      default: "BELOW"
      selector:
        select:
          options:
            - "ABOVE"
            - "BELOW"
            - "BOTH"
            - "OFF"
    font:
      name: Font
      description: Font for human-readable text
      default: "A"
      selector:
        select:
          options:
            - "A"
            - "B"
    align_ct:
      name: Center Align
      description: Center align the barcode
      default: true
      selector:
        boolean: {}
    check:
      name: Checksum
      description: Enable checksum validation
      default: false
      selector:
        boolean: {}
    force_software:
      name: Rendering Mode
      description: >
        Force a software-rendered barcode (image) instead of the printer's
        native barcode command. Use a specific image command if the default
        rendering looks wrong.
      selector:
        select:
          options:
            - label: "Auto (printer native)"
              value: "false"
            - label: "Force software (default)"
              value: "true"
            - label: "Software: Graphics"
              value: "graphics"
            - label: "Software: Column (legacy POS-58/80)"
              value: "bitImageColumn"
            - label: "Software: Raster (Epson)"
              value: "bitImageRaster"
    align:
      name: Alignment
      description: Barcode alignment
      selector:
        select:
          options:
            - "left"
            - "center"
            - "right"
