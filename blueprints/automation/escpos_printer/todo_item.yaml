blueprint:
  name: ESC/POS — TODO Item
  description: >
    When a Home Assistant todo entity changes state, print a small
    bordered card with the new (or completed) item. Great for a
    fridge-mounted printer that acknowledges shared shopping lists
    or chore boards in real time.

    Fires whenever the todo entity's item count or content changes —
    HA does not emit a per-item event, so this automation prints the
    items that appeared between the previous state and the current
    one (capped at "max items per trigger" to avoid runaway prints
    on bulk imports / syncs).
  domain: automation
  source_url: https://github.com/cognitivegears/ha-escpos-thermal-printer/blob/main/blueprints/automation/escpos_printer/todo_item.yaml
  input:
    printer:
      name: Printer
      description: ESC/POS printer device to print to.
      selector:
        device:
          integration: escpos_printer
    todo_entity:
      name: Todo entity
      description: Which todo list to watch.
      selector:
        entity:
          domain: todo
    box_style:
      name: Border style
      default: auto
      selector:
        select:
          options:
            - auto
            - single
            - double
            - ascii
            - asterisk
            - hash
            - none
    max_items_per_trigger:
      name: Max items per trigger
      description: Safety cap to stop a bulk-sync flood.
      default: 5
      selector:
        number:
          min: 1
          max: 20
          step: 1
    cut_per_item:
      name: Cut paper between items
      description: >
        When ON, each item prints on its own slip (paper is cut after each).
        When OFF, all items in a single trigger share one slip with one cut
        at the end — saves paper for batches.
      default: true
      selector:
        boolean: {}
# queued — concurrent state changes (bulk sync) should print in order rather
# than dropping prints; max_items_per_trigger is the safety cap.
mode: queued
max_exceeded: silent
trigger:
  - platform: state
    entity_id: !input todo_entity
variables:
  todo_entity_id: !input todo_entity
  cap: !input max_items_per_trigger
  cut_per_item: !input cut_per_item
  current_items: "{{ state_attr(todo_entity_id, 'items') | default([], true) }}"
  current_summaries: "{{ current_items | map(attribute='summary') | list }}"
  prior_items: "{{ trigger.from_state.attributes.get('items', []) if trigger.from_state else [] }}"
  prior_summaries: "{{ prior_items | map(attribute='summary') | list }}"
  added: "{{ current_summaries | reject('in', prior_summaries) | list }}"
action:
  - if:
      - condition: template
        value_template: "{{ added | length > 0 }}"
    then:
      - repeat:
          for_each: "{{ added[:cap] }}"
          sequence:
            - service: escpos_printer.print_box
              target:
                device_id: !input printer
              data:
                text: >
                  + {{ (repeat.item | string).replace('\n', ' ').replace('\r', ' ').replace('|', '/').replace('\t', ' ') | trim }}
                style: !input box_style
                align: left
                padding: 0
            - service: escpos_printer.print_separator
              target:
                device_id: !input printer
            - if:
                - condition: template
                  value_template: "{{ cut_per_item }}"
              then:
                - service: escpos_printer.cut
                  target:
                    device_id: !input printer
                  data:
                    mode: full
      - if:
          - condition: template
            value_template: "{{ not cut_per_item }}"
        then:
          - service: escpos_printer.cut
            target:
              device_id: !input printer
            data:
              mode: full
