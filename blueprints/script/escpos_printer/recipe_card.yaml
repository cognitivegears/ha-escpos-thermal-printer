blueprint:
  name: ESC/POS — Recipe Card
  description: >
    Print a kitchen-friendly recipe card — large serif name, servings
    note, ingredients list, then numbered steps. Pin it to the fridge.
  domain: script
  source_url: https://github.com/cognitivegears/ha-escpos-thermal-printer/blob/main/blueprints/script/escpos_printer/recipe_card.yaml
  input:
    printer:
      name: Printer
      description: ESC/POS printer device to print to.
      selector:
        device:
          integration: escpos_printer
    name:
      name: Recipe name
      selector:
        text: {}
    servings:
      name: Servings
      description: e.g. "4" or "Makes 12 cookies".
      default: "4"
      selector:
        text: {}
    ingredients:
      name: Ingredients
      description: One ingredient per line.
      default: ""
      selector:
        text:
          multiline: true
    steps:
      name: Steps
      description: One step per line. They are auto-numbered.
      default: ""
      selector:
        text:
          multiline: true
    style:
      name: Border style
      default: auto
      selector:
        select:
          options:
            - auto
            - single
            - double
            - ascii
            - asterisk
            - hash
            - none
# queued — multiple recipe prints should queue rather than drop concurrent invocations.
mode: queued
max_exceeded: silent
sequence:
  - variables:
      ingredients_input: !input ingredients
      steps_input: !input steps
      ingredient_lines: >
        {{ (ingredients_input | default('') | string).split('\n')
           | map('trim') | reject('eq', '') | list }}
      step_lines: >
        {{ (steps_input | default('') | string).split('\n')
           | map('trim') | reject('eq', '') | list }}
      ingredient_rows: >
        {% set out = [] %}
        {% for line in ingredient_lines %}
          {% set clean = line.replace('|', '/').replace('\t', ' ') %}
          {% set _ = out.append([clean]) %}
        {% endfor %}
        {{ out }}
      step_rows: >
        {% set out = [] %}
        {% for s in step_lines %}
          {% set clean = s.replace('|', '/').replace('\t', ' ') %}
          {% set _ = out.append([loop.index ~ '.', clean]) %}
        {% endfor %}
        {{ out }}
  - service: escpos_printer.print_text_image
    target:
      device_id: !input printer
    data:
      text: !input name
      font: dejavu_serif
      font_size: 36
      align: center
      feed: 1
  - service: escpos_printer.print_kvtable
    target:
      device_id: !input printer
    data:
      items:
        - ["Servings", !input servings]
      value_align: right
  - service: escpos_printer.print_separator
    target:
      device_id: !input printer
  - service: escpos_printer.print_box
    target:
      device_id: !input printer
    data:
      text: Ingredients
      style: !input style
      align: center
  - if:
      - condition: template
        value_template: "{{ ingredient_lines | length > 0 }}"
    then:
      - service: escpos_printer.print_table
        target:
          device_id: !input printer
        data:
          rows: "{{ ingredient_rows }}"
          style: !input style
          header: false
    else:
      - service: escpos_printer.print_text
        target:
          device_id: !input printer
        data:
          text: "(no ingredients)"
          align: center
  - service: escpos_printer.print_separator
    target:
      device_id: !input printer
  - service: escpos_printer.print_box
    target:
      device_id: !input printer
    data:
      text: Steps
      style: !input style
      align: center
  - if:
      - condition: template
        value_template: "{{ step_lines | length > 0 }}"
    then:
      - service: escpos_printer.print_table
        target:
          device_id: !input printer
        data:
          rows: "{{ step_rows }}"
          style: !input style
          header: false
          column_aligns: ["right", "left"]
    else:
      - service: escpos_printer.print_text
        target:
          device_id: !input printer
        data:
          text: "(no steps)"
          align: center
  - service: escpos_printer.cut
    target:
      device_id: !input printer
    data:
      mode: full
