# Docker Compose for local Home Assistant testing
# Usage: docker compose up
# Access HA at http://localhost:8123

services:
  homeassistant:
    container_name: ha-test
    image: ghcr.io/home-assistant/home-assistant:stable
    volumes:
      - ./custom_components:/config/custom_components:ro
      - ha_config:/config
    ports:
      - "8123:8123"
    restart: unless-stopped
    # USB device access for thermal printers.
    #
    # CI-M6: defaults to least-privilege device passthrough. The previous
    # default was `privileged: true`, which works but contradicts the
    # least-privilege guidance in the comments below. Flip if necessary:
    # if device-passthrough fails on your distro, uncomment the
    # `privileged: true` line below as a diagnostic fallback (don't ship
    # production HA on a privileged container).
    #
    # Recommended (least privilege): pass through the USB bus only.
    devices:
      - /dev/bus/usb:/dev/bus/usb  # All USB devices
    #privileged: true  # diagnostic fallback only — see comment above

    # Required for USB access without privileged mode.
    group_add:
      - dialout  # Serial/USB access on most Linux systems
    # Note: For USB thermal printers, you may also need to:
    # 1. Create udev rules on the host: /etc/udev/rules.d/99-escpos.rules
    #    SUBSYSTEM=="usb", ATTR{idVendor}=="04b8", MODE="0666"
    # 2. Or narrow `devices:` above to a single device path (find with `lsusb`).

volumes:
  ha_config:
