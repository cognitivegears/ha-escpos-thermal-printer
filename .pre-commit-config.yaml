repos:
  - repo: local
    hooks:
      - id: check-requirements-sync
        name: Check requirements sync (pyproject vs manifest)
        entry: python scripts/check_requirements_sync.py
        language: python
        additional_dependencies: [packaging]
        pass_filenames: false
      - id: check-manifest-sync-from-lock
        name: Check manifest sync from pyproject/uv.lock
        entry: python scripts/sync_manifest_requirements.py --check
        language: python
        additional_dependencies: [packaging]
        pass_filenames: false

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict

  # Secret-scanning. Cheap insurance against accidentally committing
  # a printer credential or webhook URL embedded in an example YAML.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
