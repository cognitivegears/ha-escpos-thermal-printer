# Project-specific Opengrep rules for ha-escpos-thermal-printer.
# (Rule schema is the Semgrep YAML format; Opengrep is rule-compatible.)
#
# These catch regressions of the Phase 2 / Phase 4 findings in
# `.full-review/05-final-report.md` that off-the-shelf scanners
# (Bandit, ruff `S`) miss because they require domain knowledge:
#
# - Direct `aiohttp.ClientSession()` construction bypasses HA's
#   pooled session (defeats SSRF middleware + connection pooling).
# - `os.path.normpath` in a validator name suggests the deny-list
#   path-traversal pattern that S-C2 documents as insecure.
# - `Image.open(` without an accompanying `formats=` arg or a
#   module-level `MAX_IMAGE_PIXELS` cap reaches every registered
#   Pillow decoder on attacker-controlled bytes.
# - `_LOGGER.error(..., err)` in the image / notify paths without
#   `sanitize_log_message` leaks URLs, paths, and Pillow byte
#   fragments (S-H5).
rules:
  - id: no-raw-aiohttp-clientsession
    patterns:
      - pattern: aiohttp.ClientSession(...)
      # `_build_pinned_session` deliberately constructs a fresh session
      # per request with a `_StaticResolver`-pinned TCPConnector. HA's
      # shared session has no public hook to inject a custom resolver,
      # so reusing it would defeat the DNS-rebinding defense
      # (S-H1, CWE-918/CWE-350). See _StaticResolver's docstring.
      - pattern-not-inside: |
          def _build_pinned_session(...):
            ...
    message: >
      Use `homeassistant.helpers.aiohttp_client.async_get_clientsession(hass)`
      instead of constructing a new `aiohttp.ClientSession()`. Per-request
      sessions defeat HA's connection pooling and skip its SSRF middleware.
    severity: ERROR
    languages: [python]
    paths:
      include:
        - "custom_components/escpos_printer/"
      exclude:
        - "custom_components/escpos_printer/printer/_escpos_bluetooth.py"

  - id: no-normpath-in-validator
    pattern: |
      def $F(...):
        ...
        os.path.normpath(...)
        ...
    message: >
      Validators must use `pathlib.Path.resolve(strict=True)`, not
      `os.path.normpath`. `normpath` doesn't dereference symlinks, so
      a `.png` symlink to `/etc/shadow` slips through a deny-list path
      check. See S-C2 in `.full-review/02a-security.md`.
    severity: WARNING
    languages: [python]
    paths:
      include:
        - "custom_components/escpos_printer/security.py"

  - id: pillow-image-open-without-formats
    pattern: Image.open($BIO)
    message: >
      `Image.open(...)` without `formats=` reaches every registered
      Pillow decoder on attacker-controlled bytes. Pass an explicit
      `formats=("PNG", "JPEG", "GIF", "BMP", "TIFF", "WEBP")` allow-list.
    severity: WARNING
    languages: [python]
    paths:
      include:
        - "custom_components/escpos_printer/"

  - id: unsanitized-logger-with-exception
    patterns:
      - pattern-either:
          - pattern: _LOGGER.error($MSG, $ERR)
          - pattern: _LOGGER.warning($MSG, $ERR)
      - pattern-not: _LOGGER.error($MSG, sanitize_log_message(...))
      - pattern-not: _LOGGER.warning($MSG, sanitize_log_message(...))
    message: >
      `_LOGGER.error(...)` with an exception in `notify.py` or
      `image_sources.py` may leak URL credentials, file paths, or
      Pillow byte fragments. Wrap the exception value in
      `sanitize_log_message(str(err))` or use `_LOGGER.exception(...)`
      (which doesn't interpolate the exception text into the format
      string).
    severity: WARNING
    languages: [python]
    paths:
      include:
        - "custom_components/escpos_printer/notify.py"
        - "custom_components/escpos_printer/image_sources.py"
        - "custom_components/escpos_printer/services/print_handlers.py"

  # ---- SVG-safety rules (Phase 4 F-CI-HIGH-3) ----
  # The SVG path was added in the add-svg-support PR. The defenses
  # depend on (a) cairosvg being called with ``unsafe=False`` so its
  # internal ``safe_fetch`` is auto-installed, (b) defusedxml being
  # the only parser touching attacker-controlled bytes, and (c) the
  # ``forbid_dtd`` default staying at False because tightening it
  # breaks standards-compliant Inkscape exports. Each rule guards
  # one of those invariants.

  - id: cairosvg-must-use-unsafe-false
    patterns:
      - pattern: cairosvg.svg2png(...)
      - pattern-not: cairosvg.svg2png(..., unsafe=False, ...)
    message: >
      `cairosvg.svg2png` must be called with `unsafe=False` — that flag
      is what makes cairosvg auto-install `safe_fetch` and refuse external
      resource references (`<image href="http://…">` etc.). Without it,
      a hostile SVG can trigger arbitrary network reads from inside
      the renderer. See svg_renderer.py and `cairosvg/parser.py:397-398`
      for the auto-install logic.
    severity: ERROR
    languages: [python]
    paths:
      include:
        - "custom_components/escpos_printer/"

  - id: no-stdlib-xml-parsing-of-untrusted-bytes
    pattern-either:
      - pattern: xml.etree.ElementTree.fromstring(...)
      - pattern: xml.etree.ElementTree.parse(...)
      - pattern: xml.sax.parseString(...)
      - pattern: xml.dom.minidom.parseString(...)
    message: >
      Use `defusedxml` (which already runs the XXE / billion-laughs /
      external-DTD gates) rather than the stdlib `xml.*` parsers on
      attacker-controlled bytes. See `validate_svg_bytes` for the
      established pattern.
    severity: ERROR
    languages: [python]
    paths:
      include:
        - "custom_components/escpos_printer/"

  - id: defusedxml-forbid-dtd-must-stay-default
    pattern-either:
      - pattern: defusedxml.ElementTree.fromstring(..., forbid_dtd=True, ...)
      - pattern: fromstring(..., forbid_dtd=True, ...)
    message: >
      `forbid_dtd=True` rejects standards-compliant Inkscape SVG exports
      (`<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" ...>`). The
      default (`forbid_dtd=False`) is intentional and load-bearing; XXE
      and billion-laughs are already blocked by the
      `forbid_entities=True` / `forbid_external=True` defaults.
      Re-enabling `forbid_dtd=True` is a regression — see Phase 4
      verification in `.full-review/04-best-practices.md`.
    severity: ERROR
    languages: [python]
    paths:
      include:
        - "custom_components/escpos_printer/"
