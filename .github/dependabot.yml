version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    # Dependabot will update pins in pyproject.toml. A companion workflow
    # auto-syncs Home Assistant manifest requirements on Dependabot PRs.
    open-pull-requests-limit: 10
    # CI-L5: group related bumps so a busy week opens 2-3 PRs instead of
    # 8-10. Each group triggers manifest-sync once, not per dependency.
    groups:
      ha-test-harness:
        patterns:
          - "pytest-homeassistant-custom-component"
          - "pytest-asyncio"
          - "pytest-cov"
      ruff-toolchain:
        patterns:
          - "ruff*"
          - "mypy*"
      security-tools:
        patterns:
          - "bandit*"
          - "pip-audit*"
          - "diff-cover*"
    ignore:
      # pytest-homeassistant-custom-component hard-pins pytest==9.0.0 (and
      # any future pin set by that package), so bumping pytest independently
      # creates an unresolvable conflict. Let the HA test harness drive the
      # pytest version; revisit if upstream loosens the pin.
      - dependency-name: "pytest"
      # dbus-fast is pinned by Home Assistant core (package_constraints.txt)
      # and the HA bluetooth integration manifest. Bumping it independently
      # breaks HA installs. Let HA core drive the version; revisit when HA
      # bumps it.
      - dependency-name: "dbus-fast"
      # Pillow is pinned to match Home Assistant core's Pillow pin (HA ships
      # its own Pillow at runtime). Bumping independently creates an
      # unresolvable resolver conflict in CI. Let HA drive the version;
      # revisit when HA bumps it. See pyproject.toml dependencies for context.
      - dependency-name: "pillow"
      # respx is hard-pinned by pytest-homeassistant-custom-component
      # (currently respx==0.22.0). Bumping independently breaks the HA test
      # harness install. Let the HA test harness drive the version; revisit
      # if upstream loosens the pin.
      - dependency-name: "respx"
      # cairosvg's ABI couples to the libcairo runtime installed on the
      # HA host (HA Container / OS / Supervised all ship a specific
      # libcairo). Auto-merging a cairosvg major bump can silently break
      # against the deployed libcairo. CVE-2026-31899 was fixed in 2.9.0;
      # the TestRealCairosvgBinding test in CI catches kwarg-surface
      # regressions when libcairo is installed (see validate.yml). Bump
      # manually when reviewing what changed in cairosvg between releases.
      - dependency-name: "cairosvg"
      # defusedxml's ``forbid_dtd`` / ``forbid_external`` / ``forbid_entities``
      # defaults are load-bearing for the SVG XML threat model. A future
      # defusedxml release that changes a default would silently weaken
      # the gates. Bump manually after reading the changelog.
      - dependency-name: "defusedxml"
