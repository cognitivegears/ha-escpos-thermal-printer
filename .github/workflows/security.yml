name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Weekly on Sundays at 3 AM UTC
    - cron: '0 3 * * 0'

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        # Pinned via pyproject.toml's [security] extra so bandit and pip-audit
        # versions match local dev and don't drift unexpectedly.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[security]"

      - name: Bandit - Python security linting
        run: |
          # Two passes: SARIF for the Security tab, exit-code gate for CI.
          # `-lll` fails the build on HIGH severity only; MEDIUM/LOW findings
          # appear in the SARIF report uploaded below but do not block.
          bandit -r custom_components/escpos_printer -f sarif -o bandit.sarif || true
          bandit -r custom_components/escpos_printer -lll

      - name: pip-audit - Dependency audit
        # pip-audit doesn't emit SARIF natively; the JSON report is kept as a
        # build artifact only. The text run below is the actual gate.
        run: |
          pip-audit --format json --output pip-audit-report.json || true
          pip-audit

      - name: Upload Bandit SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit.sarif

      - name: Upload pip-audit JSON artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          if-no-files-found: ignore
