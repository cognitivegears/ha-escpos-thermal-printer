name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Daily at 3 AM UTC — image-pipeline code has a wide ingress surface
    # and we want CVEs against Pillow / aiohttp / httpx surfaced quickly.
    - cron: '0 3 * * *'

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.14'

      - name: Cache pip dependencies
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        # Pinned via pyproject.toml's [security] extra so bandit and pip-audit
        # versions match local dev and don't drift unexpectedly.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[security]"

      - name: Bandit - Python security linting
        run: |
          # Two passes: SARIF for the Security tab, exit-code gate for CI.
          # CI-M5: `-ll` (MEDIUM-and-above) gate instead of the previous
          # `-lll` (HIGH-only). MEDIUM findings now block the build rather
          # than silently accumulating in the Security tab. Project-specific
          # false positives go in `[tool.bandit] skips` in `pyproject.toml`
          # so the skip rationale is reviewable.
          # `-c pyproject.toml` picks up [tool.bandit] skips that mirror the
          # ruff S101/S110 ignores. `scripts/` is included because it runs
          # with elevated privileges in dependabot-auto-sync.yml.
          bandit -c pyproject.toml -r custom_components/escpos_printer scripts -f sarif -o bandit.sarif || true
          bandit -c pyproject.toml -r custom_components/escpos_printer scripts -ll

      - name: Install Cosign
        # Required by the Opengrep install script's --verify-signatures flag,
        # which validates the binary against the sigstore-signed release.
        uses: sigstore/cosign-installer@v3

      - name: Install Opengrep
        # Opengrep is an open-source (LGPL-2.1) fork of Semgrep maintained by
        # a consortium of AppSec vendors after Semgrep moved CE features
        # behind a commercial license. Rule format and SARIF output are
        # backward-compatible with Semgrep, so `.github/opengrep/escpos.yml`
        # runs unchanged.
        #
        # Opengrep is distributed as a signed binary (not on PyPI), so it
        # can't be tracked by Dependabot's pip ecosystem. Bump OPENGREP_VERSION
        # below by hand when a new release ships:
        #   https://github.com/opengrep/opengrep/releases
        #
        # We use `gh release download` rather than piping upstream's
        # install.sh through bash, because install.sh validates the
        # requested version via an unauthenticated GitHub API call
        # (api.github.com/repos/opengrep/opengrep/releases) that gets
        # rate-limited on shared runner IPs and fails with "Failed to
        # fetch available versions from GitHub". `gh` uses GITHUB_TOKEN
        # for the 5000/hr authenticated quota.
        env:
          OPENGREP_VERSION: v1.21.0
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64|Linux-amd64) DIST="opengrep_manylinux_x86" ;;
            Linux-aarch64|Linux-arm64) DIST="opengrep_manylinux_aarch64" ;;
            Darwin-x86_64|Darwin-amd64) DIST="opengrep_osx_x86" ;;
            Darwin-aarch64|Darwin-arm64) DIST="opengrep_osx_arm64" ;;
            *) echo "Unsupported runner $(uname -s)-$(uname -m)" >&2; exit 1 ;;
          esac
          INST="${HOME}/.opengrep/cli/${OPENGREP_VERSION}"
          mkdir -p "${INST}"
          gh release download "${OPENGREP_VERSION}" \
            --repo opengrep/opengrep \
            --pattern "${DIST}" \
            --pattern "${DIST}.cert" \
            --pattern "${DIST}.sig" \
            --dir "${INST}"
          mv "${INST}/${DIST}"      "${INST}/opengrep"
          mv "${INST}/${DIST}.cert" "${INST}/opengrep.cert"
          mv "${INST}/${DIST}.sig"  "${INST}/opengrep.sig"
          chmod +x "${INST}/opengrep"
          # Verify the sigstore signature with the cosign installed above.
          # Identity / issuer regex mirrors install.sh.
          cosign verify-blob \
            --cert "${INST}/opengrep.cert" \
            --signature "${INST}/opengrep.sig" \
            --certificate-identity-regexp "https://github.com/opengrep/opengrep.+" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${INST}/opengrep"
          ln -sfn "${INST}" "${HOME}/.opengrep/cli/latest"
          echo "${HOME}/.opengrep/cli/latest" >> "${GITHUB_PATH}"

      - name: Opengrep - Project-specific security rules
        run: |
          # Project-specific rules under .github/opengrep/ catch regressions
          # of the Phase 2 findings that Bandit can't (SSRF setup, path
          # validators, Pillow decoders, log sanitization). See the rule
          # file for the rationale.
          opengrep scan --config .github/opengrep/escpos.yml --error \
            --sarif --output opengrep.sarif \
            custom_components/escpos_printer || true
          # Hard gate: fail the build on any ERROR-severity rule hit.
          opengrep scan --config .github/opengrep/escpos.yml \
            --severity ERROR --error \
            custom_components/escpos_printer

      - name: Upload Opengrep SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: opengrep.sarif
          category: opengrep

      - name: pip-audit - Dependency audit
        # pip-audit doesn't emit SARIF natively; the JSON report is kept as a
        # build artifact only. The text run below is the actual gate.
        #
        # `--skip-editable` skips auditing the project itself (this repo isn't
        # published to PyPI, so pip-audit can't resolve it and prints a noisy
        # "Dependency not found on PyPI" skip line otherwise).
        #
        # `--ignore-vuln` entries below cover CVEs in dependencies that are
        # hard-pinned by Home Assistant core (see CLAUDE.md: "After HA version
        # bumps, re-check Dependabot security alerts"). These only affect the
        # dev/CI environment — end users install via manifest.json, which
        # tracks HA's own range — and auto-clear when HA bumps the pin. The
        # ignore list should be revisited after each HA bump.
        run: |
          PIP_AUDIT_ARGS=(
            --skip-editable
            # Pillow 12.2.0 — pinned by homeassistant==2026.6.3.
            # Fixed in 12.3.0; no HA release ships it yet.
            --ignore-vuln PYSEC-2026-2253
            --ignore-vuln PYSEC-2026-2254
            --ignore-vuln PYSEC-2026-2255
            --ignore-vuln PYSEC-2026-2256
            --ignore-vuln PYSEC-2026-2257
            --ignore-vuln PYSEC-2026-3451
            --ignore-vuln PYSEC-2026-3452
            --ignore-vuln PYSEC-2026-3453
            # aiohttp 3.13.5 — pinned by homeassistant==2026.6.3.
            # All fixed in 3.14.0 / 3.14.1; clears when HA bumps the pin.
            --ignore-vuln PYSEC-2026-237
            --ignore-vuln PYSEC-2026-2104
            --ignore-vuln PYSEC-2026-2105
            --ignore-vuln PYSEC-2026-2106
            --ignore-vuln PYSEC-2026-2107
            --ignore-vuln PYSEC-2026-2108
            --ignore-vuln PYSEC-2026-2109
            --ignore-vuln PYSEC-2026-2110
            --ignore-vuln PYSEC-2026-2111
            --ignore-vuln PYSEC-2026-2112
            --ignore-vuln PYSEC-2026-2113
            # cryptography 48.0.0 — pinned by homeassistant==2026.6.3.
            # Fixed in 48.0.1.
            --ignore-vuln GHSA-537c-gmf6-5ccf
            # PyJWT 2.12.1 — pinned by homeassistant==2026.6.3.
            # Fixed in 2.13.0.
            --ignore-vuln PYSEC-2026-175
            --ignore-vuln PYSEC-2026-176
            --ignore-vuln PYSEC-2026-177
            --ignore-vuln PYSEC-2026-178
            --ignore-vuln PYSEC-2026-179
          )
          pip-audit "${PIP_AUDIT_ARGS[@]}" --format json --output pip-audit-report.json || true
          pip-audit "${PIP_AUDIT_ARGS[@]}"

      - name: Upload Bandit SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit.sarif

      - name: Upload pip-audit JSON artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          if-no-files-found: ignore
