name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # CI-M1: test against the PHCC-pinned HA AND HA `master` so we
        # get a 1-week heads-up before a HA release breaks us. `master`
        # runs are non-blocking (continue-on-error) since HA's main
        # branch is allowed to break without affecting PR mergeability.
        ha-version: [pinned, master]
        include:
          - ha-version: master
            continue-on-error: true
    continue-on-error: ${{ matrix.continue-on-error == true }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          # gitleaks scans the PR's commit range, which requires the
          # base commit to be present in history (default depth=1 only
          # fetches the head SHA, causing `git rev-parse <base>^..<head>`
          # to fail with "unknown revision"). 0 = full history.
          fetch-depth: 0
      - uses: actions/setup-python@v7.0.0
        with:
          python-version: '3.14'

      - name: Install dev deps (matches pyproject pins)
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Override Home Assistant to master (canary)
        if: matrix.ha-version == 'master'
        run: |
          # Upgrade both HA core *and* the test harness in lockstep —
          # pytest-homeassistant-custom-component is tightly coupled to
          # a specific HA core version (its fixtures load
          # device_registry / set DEFAULT_TIME_ZONE the way that release
          # expects). Upgrading only HA leaves the pinned plugin
          # disagreeing with master about fixture setup, which surfaces
          # as `KeyError: 'device_registry'` and timezone-fixture
          # teardown failures rather than as real HA-master breakages.
          pip install --upgrade git+https://github.com/home-assistant/core.git@dev
          pip install --upgrade git+https://github.com/MatthewFlamm/pytest-homeassistant-custom-component.git@master

      - name: Check dependency sync (manifest vs pyproject)
        run: |
          python scripts/check_requirements_sync.py
          python scripts/sync_manifest_requirements.py --check

      - name: Check manifest / pyproject version are aligned
        run: python scripts/check_version_sync.py

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy custom_components/

      # CI-L1: mirror the pre-commit gitleaks hook in CI so drive-by PRs
      # from forks (where the contributor may not have pre-commit
      # installed) still get the secret-scan gate.
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run unit tests with coverage gate
        # Coverage floor: matches pyproject.toml [tool.coverage.report]
        # fail_under (80). Long-term target is silver-tier 95%.
        run: |
          pytest --cov=custom_components/escpos_printer \
                 --cov-report=term \
                 --cov-report=xml \
                 --cov-fail-under=80

      - name: Upload coverage XML (artifact)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

      - name: Per-patch coverage gate (CI-H1)
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          diff-cover coverage.xml \
            --compare-branch=origin/${{ github.base_ref }} \
            --fail-under=90

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-python@v7.0.0
        with:
          python-version: '3.14'

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run integration tests
        # BT/network integration tests use TCP loopback against the
        # in-tree VirtualPrinter emulator — no real radio or external
        # services required.
        run: pytest -m integration -v
