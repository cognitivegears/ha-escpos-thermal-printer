name: Hassfest

on:
  push:
  pull_request:
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Hassfest validation
        # CI-H2: pin to a SHA instead of `@master`. The HA actions repo
        # does not publish versioned tags for the hassfest sub-action;
        # update by re-pinning after reviewing
        # https://github.com/home-assistant/actions/commits/master
        uses: home-assistant/actions/hassfest@f6f29a7ee3fa0eccadf3620a7b9ee00ab54ec03b  # master as of 2026-05-24
